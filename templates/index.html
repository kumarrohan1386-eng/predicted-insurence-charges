<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Charges Prediction</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
        }

        label{
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:22px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Insurance Charges Prediction</h2>

<form action="/predict" method="POST">

<label>Age</label>
<input type="number" name="age" required>

<label>Gender</label>
<select name="is_female">
    <option value="1">Female</option>
    <option value="0">Male</option>
</select>

<label>BMI</label>
<input type="number" step="0.01" name="bmi" required>

<label>Children</label>
<input type="number" name="children" required>

<label>Smoker</label>
<select name="is_smoker">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Region Southeast</label>
<select name="region_southeast">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Region Northwest</label>
<select name="region_northwest">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>BMI Category Obese</label>
<select name="bmi_category_obese">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<button type="submit">Predict</button>

</form>

{% if prediction_text %}
<div class="result">
    {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
